name: GUID check

# Gates pull requests for awa-articleGuid issues:
#   - duplicate GUIDs across the repo
#   - changed / removed GUIDs on existing articles
#   - new articles missing a GUID (suggested values are posted as a PR comment)
# Each problem fails the job and comments on the PR. Mark this check as REQUIRED in the
# calling repo's branch protection / ruleset so a failure blocks the merge.
#
# This workflow runs on `pull_request_target` (via the caller) so fork PRs are never
# gated behind a manual "Approve and run" click. For security, it never checks out fork
# code: the base branch is checked out (trusted) for the repo-wide GUID inventory, and
# the PR's changed .md files are downloaded as DATA via the GitHub API (never executed).

permissions:
  pull-requests: write
  contents: read

on:
  workflow_call:
    secrets:
      AccessToken:
        required: true

jobs:
  check-guids:
    if: github.repository_owner == 'MicrosoftDocs' || github.repository_owner == 'andymyersMSFT'
    runs-on: ubuntu-latest
    env:
      # Passed via env (not inlined into run scripts) to avoid expression injection.
      BASE_REF: ${{ github.base_ref }}
    steps:
      # PR_FILES_DIR holds untrusted PR file content as data only (never executed).
      # Set here (not at job-level env) because the runner context isn't available there.
      - name: Set up workspace paths
        run: echo "PR_FILES_DIR=$RUNNER_TEMP/pr-files" >> "$GITHUB_ENV"

      # Trusted base checkout for the repo-wide duplicate inventory and base-side GUID
      # reads. No `ref:` -> under pull_request_target this is the base branch we control.
      # persist-credentials: false keeps the privileged token out of .git/config; all
      # analysis below is local git reads that need no credentials.
      - name: Checkout base (trusted)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      # Download the PR's changed .md files as DATA via the API. Nothing from the fork is
      # placed in the working tree or executed. Content is fetched at the immutable head
      # SHA (no TOCTOU) and the disk path is validated to stay inside PR_FILES_DIR.
      - name: Download PR changed .md files via API (data only)
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.AccessToken }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const pr = context.payload.pull_request;
            const headSha = pr.head.sha;                 // immutable commit, not a branch
            const headRepo = pr.head.repo;               // fork repo (may equal base)
            const outDir = process.env.PR_FILES_DIR;
            fs.mkdirSync(outDir, { recursive: true });

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const manifest = [];
            for (const f of files) {
              if (!f.filename.endsWith('.md')) continue;
              if (f.filename.includes('/includes/')) continue;

              manifest.push({
                path: f.filename,
                status: f.status,
                previous: f.previous_filename || null,
              });

              if (f.status === 'removed') continue;

              // Resolve destination and guard against path traversal (defense in depth).
              const dest = path.resolve(outDir, f.filename);
              const rel = path.relative(outDir, dest);
              if (rel === '' || rel.startsWith('..') || path.isAbsolute(rel)) {
                core.setFailed(`Refusing to write outside PR_FILES_DIR: ${f.filename}`);
                throw new Error('path traversal');
              }

              // Fetch file content at the head SHA as DATA. Prefer the fork repo at the
              // immutable SHA (reliable for cross-fork commits); fall back to the
              // per-file contents_url from listFiles.
              let buf = null;
              try {
                const res = await github.rest.repos.getContent({
                  owner: headRepo.owner.login,
                  repo: headRepo.name,
                  path: f.filename,
                  ref: headSha,
                });
                if (res.data && res.data.content) {
                  buf = Buffer.from(res.data.content, res.data.encoding || 'base64');
                }
              } catch (e) {
                core.info(`getContent failed for ${f.filename}: ${e.message}; trying contents_url`);
              }
              if (buf === null && f.contents_url) {
                try {
                  const res = await github.request(f.contents_url);
                  if (res.data && res.data.content) {
                    buf = Buffer.from(res.data.content, res.data.encoding || 'base64');
                  }
                } catch (e) {
                  core.info(`contents_url fetch failed for ${f.filename}: ${e.message}`);
                }
              }
              if (buf === null) {
                core.warning(`Could not fetch content for ${f.filename}; skipping its content checks.`);
                continue;
              }

              fs.mkdirSync(path.dirname(dest), { recursive: true });
              fs.writeFileSync(dest, buf);
            }

            fs.writeFileSync(path.join(outDir, '_manifest.json'), JSON.stringify(manifest));
            core.info(`Manifest: ${manifest.length} markdown file(s).`);

      - name: Extract GUIDs from PR files
        id: extract
        run: |
          LC_ALL=C
          export LC_ALL

          MANIFEST="$PR_FILES_DIR/_manifest.json"

          # Files that may carry a GUID in this PR (present content): added/modified/renamed.
          mapfile -t PR_FILES < <(jq -r '.[] | select(.status=="added" or .status=="modified" or .status=="renamed") | .path' "$MANIFEST" 2>/dev/null)

          if [ "${#PR_FILES[@]}" -eq 0 ]; then
            echo "No markdown files changed in this PR."
            echo "has_guids=false" >> "$GITHUB_OUTPUT"
            echo "# GUID check report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No markdown files added or modified in this PR." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "Changed files:"
          printf '%s\n' "${PR_FILES[@]}"
          echo ""

          # Extract GUIDs from PR (head) content into a pattern file + a guid/file map.
          PATTERN_FILE=$(mktemp)
          echo "pattern_file=$PATTERN_FILE" >> "$GITHUB_OUTPUT"
          : > /tmp/pr_guid_files.tsv

          for file in "${PR_FILES[@]}"; do
            src="$PR_FILES_DIR/$file"
            [ -f "$src" ] || continue
            GUID=$(sed '1s/^\xEF\xBB\xBF//' "$src" | tr -d '\r' | sed -n '2,/^---$/p' | grep -i '^awa-articleGuid:' | sed 's/^[^:]*:\s*//' | tr -d '[:space:]')
            if [ -n "$GUID" ]; then
              echo "$GUID" >> "$PATTERN_FILE"
              printf '%s\t%s\n' "$GUID" "$file" >> /tmp/pr_guid_files.tsv
              echo "Found GUID $GUID in $file"
            else
              echo "No GUID in $file (a GUID is required for new articles before merge)"
            fi
          done

          if [ ! -s "$PATTERN_FILE" ]; then
            echo ""
            echo "No GUIDs to check."
            echo "has_guids=false" >> "$GITHUB_OUTPUT"
            echo "# GUID check report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No GUIDs to check. New files without a GUID are reported separately and must be fixed before merge." >> "$GITHUB_STEP_SUMMARY"
            rm -f "$PATTERN_FILE"
            exit 0
          fi

          echo "has_guids=true" >> "$GITHUB_OUTPUT"

      - name: Check for new files missing a GUID
        id: missing
        if: always()
        run: |
          LC_ALL=C
          export LC_ALL

          MANIFEST="$PR_FILES_DIR/_manifest.json"

          # Only newly added files can be "missing" a GUID — modified/renamed files keep
          # their GUID and are covered by the changed/removed check below.
          mapfile -t ADDED_FILES < <(jq -r '.[] | select(.status=="added") | .path' "$MANIFEST" 2>/dev/null)

          if [ "${#ADDED_FILES[@]}" -eq 0 ]; then
            echo "No newly added markdown files in this PR."
            echo "has_missing=false" >> "$GITHUB_OUTPUT"
            echo "## Missing GUIDs" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No newly added markdown files in this PR." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          > /tmp/missing_guids.txt

          for file in "${ADDED_FILES[@]}"; do
            src="$PR_FILES_DIR/$file"
            [ -f "$src" ] || continue

            # Skip files without frontmatter — they are not articles.
            if ! head -1 "$src" | sed 's/^\xEF\xBB\xBF//' | tr -d '\r' | grep -q '^---$'; then
              echo "Skipping $file (no frontmatter)"
              continue
            fi

            GUID=$(sed '1s/^\xEF\xBB\xBF//' "$src" | tr -d '\r' | sed -n '2,/^---$/p' | grep -i '^awa-articleGuid:' | sed 's/^[^:]*:\s*//' | tr -d '[:space:]')
            if [ -z "$GUID" ]; then
              SUGGESTED=$(uuidgen | tr '[:upper:]' '[:lower:]')
              printf '%s\t%s\n' "$file" "$SUGGESTED" >> /tmp/missing_guids.txt
              echo "Missing GUID in $file (suggested $SUGGESTED)"
            fi
          done

          if [ -s /tmp/missing_guids.txt ]; then
            echo "has_missing=true" >> "$GITHUB_OUTPUT"
            echo "::error::One or more new articles are missing an awa-articleGuid!"

            echo "## Missing GUIDs" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**One or more new articles are missing an \`awa-articleGuid\`.** Add the suggested GUID to each file:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| File | Suggested GUID |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|----------------|" >> "$GITHUB_STEP_SUMMARY"
            while IFS=$'\t' read -r file guid; do
              echo "| \`$file\` | \`$guid\` |" >> "$GITHUB_STEP_SUMMARY"
            done < /tmp/missing_guids.txt

            exit 1
          fi

          echo "All newly added articles already have a GUID."
          echo "has_missing=false" >> "$GITHUB_OUTPUT"
          echo "## Missing GUIDs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All newly added articles already have a GUID." >> "$GITHUB_STEP_SUMMARY"

      - name: Check for duplicates across repo
        id: check
        if: steps.extract.outputs.has_guids == 'true'
        run: |
          LC_ALL=C
          export LC_ALL

          PATTERN_FILE="${{ steps.extract.outputs.pattern_file }}"

          # Base-side paths touched by this PR (modified path, renamed-from previous,
          # removed path). These are excluded from the base inventory so a file that
          # simply keeps its own GUID isn't flagged as a duplicate against its own base
          # copy. The merged repo state = (base minus these paths) plus the PR files.
          jq -r '.[] | (.previous // .path)' "$PR_FILES_DIR/_manifest.json" 2>/dev/null > /tmp/pr_base_paths.txt || true

          # Base-branch inventory: which base .md files contain one of the PR GUIDs.
          # The PR GUID values are read from PATTERN_FILE as DATA (getline) and the file
          # paths are passed as awk variables — PR-derived values never become program text.
          find . -name '*.md' -not -path '*/includes/*' -print0 | \
            xargs -0 awk -v PF="$PATTERN_FILE" -v EX="/tmp/pr_base_paths.txt" '
              BEGIN {
                while ((getline g < PF) > 0) {
                  gsub(/[[:space:]]/, "", g)
                  if (length(g) > 0) want[tolower(g)] = 1
                }
                while ((getline p < EX) > 0) {
                  if (length(p) > 0) exclude[p] = 1
                }
              }
              FNR == 1 {
                fn = FILENAME
                sub(/^\.\//, "", fn)
                skip = (fn in exclude)
              }
              skip { nextfile }
              FNR > 50 { nextfile }
              tolower($0) ~ /awa-articleguid:/ {
                val = $0
                sub(/^[^:]*:[[:space:]]*/, "", val)
                gsub(/[[:space:]]/, "", val)
                val = tolower(val)
                if (val in want) {
                  print val "\t" fn
                }
                nextfile
              }
            ' > /tmp/base_guid_files.tsv || true

          rm -f "$PATTERN_FILE"

          # A GUID is a duplicate if it already exists on the base branch, or if it
          # appears in more than one file in this PR. Emit "guid<TAB>file1|file2|..."
          # (base files first, then PR files) for the comment step.
          awk -F'\t' '
            FNR == NR {
              g = tolower($1); f = $2
              files[g] = files[g] f "|"
              base[g] = 1
              next
            }
            {
              g = tolower($1); f = $2
              files[g] = files[g] f "|"
              prcount[g]++
              pr[g] = 1
            }
            END {
              for (g in pr) {
                if (base[g] == 1 || prcount[g] > 1) {
                  print g "\t" files[g]
                }
              }
            }
          ' /tmp/base_guid_files.tsv /tmp/pr_guid_files.tsv > /tmp/dupes.txt || true

          if [ -s /tmp/dupes.txt ]; then
            echo "has_dupes=true" >> "$GITHUB_OUTPUT"
            echo "::error::Duplicate awa-articleGuid values found in this PR!"

            echo "# GUID check report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Duplicate GUIDs" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Duplicate GUIDs found.** The following GUIDs appear in multiple files:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| GUID | Files |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
            while IFS=$'\t' read -r guid filestr; do
              files=$(echo "$filestr" | tr '|' ',' | sed 's/,$//' | sed 's|\./||g')
              echo "| \`$guid\` | $files |" >> "$GITHUB_STEP_SUMMARY"
            done < /tmp/dupes.txt

            exit 1
          fi

          echo "All GUIDs in this PR are unique across the repository."
          echo "# GUID check report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Duplicate GUIDs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "All GUIDs in this PR are unique across the repository." >> "$GITHUB_STEP_SUMMARY"

      - name: Check for changed or removed GUIDs
        id: changed
        if: always()
        run: |
          LC_ALL=C
          export LC_ALL

          MANIFEST="$PR_FILES_DIR/_manifest.json"

          # Modified + renamed files — added files can't have a changed GUID.
          # Output: new_path<TAB>old_path  (old_path = previous filename for renames).
          jq -r '.[] | select(.status=="modified" or .status=="renamed") | [.path, (.previous // .path)] | @tsv' "$MANIFEST" 2>/dev/null > /tmp/modified.tsv

          if [ ! -s /tmp/modified.tsv ]; then
            echo "No modified or renamed markdown files in this PR."
            echo "has_changed=false" >> "$GITHUB_OUTPUT"
            echo "## Changed GUIDs" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No modified or renamed markdown files in this PR." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          > /tmp/changed_guids.txt

          while IFS=$'\t' read -r new_path old_path; do
            # Skip the /includes/ directory on either side (already filtered, belt + braces)
            case "$old_path" in */includes/*) continue ;; esac
            case "$new_path" in */includes/*) continue ;; esac

            src="$PR_FILES_DIR/$new_path"
            [ -f "$src" ] || continue

            # Current GUID from the PR (head) content fetched via API.
            CURRENT_GUID=$(sed '1s/^\xEF\xBB\xBF//' "$src" | tr -d '\r' | sed -n '2,/^---$/p' | grep -i '^awa-articleGuid:' | sed 's/^[^:]*:\s*//' | tr -d '[:space:]')

            # Base branch GUID from the OLD path (handles renames correctly).
            BASE_GUID=$(git show "origin/$BASE_REF:$old_path" 2>/dev/null | sed '1s/^\xEF\xBB\xBF//' | tr -d '\r' | sed -n '2,/^---$/p' | grep -i '^awa-articleGuid:' | sed 's/^[^:]*:\s*//' | tr -d '[:space:]')

            # Nothing to protect if the base had no GUID.
            if [ -z "$BASE_GUID" ]; then
              continue
            fi

            if [ -z "$CURRENT_GUID" ]; then
              # GUID was removed — Assign workflow would replace it with a new one on merge.
              printf '%s\t%s\t%s\n' "$new_path" "$BASE_GUID" "(removed)" >> /tmp/changed_guids.txt
              echo "GUID removed from $new_path (was $BASE_GUID)"
            elif [ "$(echo "$BASE_GUID" | tr '[:upper:]' '[:lower:]')" != "$(echo "$CURRENT_GUID" | tr '[:upper:]' '[:lower:]')" ]; then
              printf '%s\t%s\t%s\n' "$new_path" "$BASE_GUID" "$CURRENT_GUID" >> /tmp/changed_guids.txt
              echo "GUID changed in $new_path: $BASE_GUID -> $CURRENT_GUID"
            fi
          done < /tmp/modified.tsv

          if [ -s /tmp/changed_guids.txt ]; then
            echo "has_changed=true" >> "$GITHUB_OUTPUT"
            echo "::error::One or more awa-articleGuid values were accidentally changed or removed in this PR!"

            echo "## Changed GUIDs" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**One or more GUIDs were accidentally changed or removed.** Restore the original GUID for each file:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| File | Original GUID | Changed to |" >> "$GITHUB_STEP_SUMMARY"
            echo "|------|---------------|------------|" >> "$GITHUB_STEP_SUMMARY"
            while IFS=$'\t' read -r file base_guid current_guid; do
              echo "| \`$file\` | \`$base_guid\` | \`$current_guid\` |" >> "$GITHUB_STEP_SUMMARY"
            done < /tmp/changed_guids.txt

            exit 1
          fi

          echo "No GUIDs were accidentally changed or removed."
          echo "has_changed=false" >> "$GITHUB_OUTPUT"
          echo "## Changed GUIDs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No GUIDs were accidentally changed or removed." >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR for changed GUIDs
        if: always() && steps.changed.outputs.has_changed == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.AccessToken }}
          script: |
            const fs = require('fs');
            const lines = fs.readFileSync('/tmp/changed_guids.txt', 'utf8').trim().split('\n');

            let body = '## One or more GUIDs were accidentally changed or removed\n\n';
            body += 'The `awa-articleGuid` field must not be modified or removed for existing articles. Please restore the original GUID for each file listed below.\n\n';
            body += '| File path | Restore to | Current (incorrect) |\n| --- | --- | --- |\n';

            for (const line of lines) {
              const [file, baseGuid, currentGuid] = line.split('\t');
              body += `| \`${file}\` | \`${baseGuid}\` | \`${currentGuid}\` |\n`;
            }

            // Delete previous changed-GUID comments (matches both old and new title prefixes)
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            for (const c of comments.data) {
              if (c.body.startsWith('## One or more GUIDs were accidentally changed')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Comment on PR for duplicate GUIDs
        if: always() && steps.check.outputs.has_dupes == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.AccessToken }}
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const { execFileSync } = require('child_process');

            const dupes = fs.readFileSync('/tmp/dupes.txt', 'utf8').trim();
            const baseRef = process.env.GITHUB_BASE_REF || 'main';

            // Check if a file had this GUID on the base branch. The file path is passed
            // as an argv element (no shell), so a crafted filename can't inject a command.
            function hadGuidOnBase(file, guid) {
              try {
                const content = execFileSync('git', ['show', `origin/${baseRef}:${file}`], {
                  encoding: 'utf8',
                  stdio: ['ignore', 'pipe', 'ignore'], // discard stderr (replaces 2>/dev/null)
                });
                const match = content.match(/awa-articleGuid:\s*(\S+)/i);
                return match && match[1].toLowerCase() === guid.toLowerCase();
              } catch {
                return false;
              }
            }

            let body = '## One or more duplicate GUIDs were found\n\n';
            body += 'Update the `awa-articleGuid` field in each file in the **Action required** table with the provided GUID.\n\n';

            for (const line of dupes.split('\n')) {
              const [guid, fileStr] = line.split('\t');
              const allFiles = fileStr.split('|').filter(Boolean).map(f => f.replace(/^\.\//, ''));

              const keepFiles = allFiles.filter(f => hadGuidOnBase(f, guid));
              const changeFiles = allFiles.filter(f => !hadGuidOnBase(f, guid));

              // If all files are new to this GUID, keep the first one and change the rest
              if (keepFiles.length === 0 && changeFiles.length > 1) {
                keepFiles.push(changeFiles.shift());
              }

              body += `**Duplicate GUID:** \`${guid}\`\n\n`;

              if (changeFiles.length > 0) {
                body += 'Action required:\n';
                body += '| File path | Update to | New GUID |\n| --- | :---: | --- |\n';
                for (const f of changeFiles) {
                  const newGuid = crypto.randomUUID();
                  body += `| \`${f}\` | \u2192 | \`${newGuid}\` |\n`;
                }
                body += '\n';
              }

              if (keepFiles.length > 0) {
                body += 'Do not change:\n';
                body += '| File path | Current GUID |\n| --- | --- |\n';
                for (const f of keepFiles) {
                  body += `| \`${f}\` | \`${guid}\` |\n`;
                }
                body += '\n';
              }
            }

            // Delete previous duplicate GUID comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            for (const c of comments.data) {
              if (c.body.startsWith('## One or more duplicate GUIDs were found')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Comment on PR for missing GUIDs
        if: always() && steps.missing.outputs.has_missing == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.AccessToken }}
          script: |
            const fs = require('fs');
            const lines = fs.readFileSync('/tmp/missing_guids.txt', 'utf8').trim().split('\n');

            let body = '## One or more new articles are missing a GUID\n\n';
            body += 'Every new article must include an `awa-articleGuid` field in its frontmatter. ';
            body += 'Add the suggested GUID below to each file (or supply your own unique GUID), then push to update this PR.\n\n';
            body += '| File path | Add this GUID |\n| --- | --- |\n';

            for (const line of lines) {
              const [file, guid] = line.split('\t');
              body += `| \`${file}\` | \`${guid}\` |\n`;
            }

            // Delete previous missing-GUID comments
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            for (const c of comments.data) {
              if (c.body.startsWith('## One or more new articles are missing a GUID')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
